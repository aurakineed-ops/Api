services:
  - type: web
    name: osint-api-hub
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 18.17.1
      - key: SESSION_SECRET
        generateValue: true
      - key: JWT_SECRET
        generateValue: true
    disk:
      name: sqlite-data
      mountPath: /data
      sizeGB: 1
